<!doctype html>
<html lang="ka">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FARMASI Event · ადმინ-დაშბორდი</title>
  <style>
    :root {
      --wine: #2a0e16;
      --wine-2: #3a141f;
      --card: #34121c;
      --card-2: #3f1824;
      --gold: #e8c468;
      --gold-light: #f4d989;
      --cream: #f5e9dc;
      --cream-dim: #b89b8c;
      --line: rgba(232, 196, 104, 0.18);
      --line-strong: rgba(232, 196, 104, 0.35);
      --bus: #6db8de;
      --car: #c98ad8;
      --ok: #6ddea0;
      --pending: #e8a868;
      --bad: #ff7088;
      --geo: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--geo);
      color: var(--cream);
      background:
        radial-gradient(1200px 600px at 80% -10%, rgba(232,196,104,0.10), transparent 60%),
        radial-gradient(900px 500px at -10% 110%, rgba(201,138,216,0.08), transparent 55%),
        var(--wine);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      width: min(1100px, 100%);
      margin: 0 auto;
      padding: 22px 16px 60px;
    }

    /* === LOGIN === */
    .login {
      max-width: 380px;
      margin: 12vh auto 0;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 30px 24px;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0,0,0,0.45);
    }
    .login h1 { font-size: 22px; margin: 0 0 6px; color: var(--gold); }
    .login p { color: var(--cream-dim); font-size: 13px; margin: 0 0 20px; }
    .login input {
      width: 100%;
      height: 50px;
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      color: var(--cream);
      font-size: 20px;
      text-align: center;
      letter-spacing: 6px;
      outline: none;
      margin-bottom: 14px;
    }
    .login input:focus { border-color: var(--gold); }
    .login button {
      width: 100%;
      height: 48px;
      border: 0;
      border-radius: 10px;
      background: var(--gold);
      color: #1a0a10;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      font-family: var(--geo);
    }
    .login button:hover { background: var(--gold-light); }
    .login .err { color: var(--bad); font-size: 13px; min-height: 18px; margin-top: 10px; }

    .app { display: none; }
    .app.show { display: block; }
    .login.hide { display: none; }

    /* === HEADER === */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      padding: 6px 0 18px;
    }
    .title h1 { margin: 0; font-size: 24px; color: var(--gold); letter-spacing: 0.3px; }
    .title p { margin: 3px 0 0; color: var(--cream-dim); font-size: 13px; }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .btn-ghost {
      height: 38px;
      padding: 0 16px;
      border: 1px solid var(--line-strong);
      border-radius: 9px;
      background: transparent;
      color: var(--gold);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--geo);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-ghost:hover { background: rgba(232,196,104,0.10); }
    .updated { font-size: 11px; color: var(--cream-dim); }

    /* === STAT CARDS === */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    .stat {
      background: linear-gradient(160deg, var(--card-2), var(--card));
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px 18px;
      position: relative;
      overflow: hidden;
    }
    .stat::after {
      content: "";
      position: absolute;
      inset: 0 0 auto auto;
      width: 70px; height: 70px;
      background: radial-gradient(circle at top right, rgba(232,196,104,0.18), transparent 70%);
    }
    .stat .num { font-size: 34px; font-weight: 800; line-height: 1; color: var(--cream); }
    .stat .lbl { margin-top: 7px; font-size: 12px; color: var(--cream-dim); font-weight: 600; }
    .stat.accent .num { color: var(--gold); }
    .stat.bus .num { color: var(--bus); }
    .stat.car .num { color: var(--car); }
    .stat.ok .num { color: var(--ok); }

    /* === SECTIONS === */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-bottom: 16px;
    }
    @media (min-width: 760px) {
      .grid-2 { grid-template-columns: 1.3fr 1fr; }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
    }
    .card h2 {
      margin: 0 0 14px;
      font-size: 15px;
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card h2 .count {
      margin-left: auto;
      font-size: 12px;
      color: var(--cream-dim);
      font-weight: 600;
    }

    /* === BUS MAP === */
    .bus-legend {
      display: flex;
      gap: 16px;
      margin-bottom: 14px;
      font-size: 12px;
      color: var(--cream-dim);
      flex-wrap: wrap;
    }
    .bus-legend span { display: inline-flex; align-items: center; gap: 6px; }
    .dot { width: 12px; height: 12px; border-radius: 4px; display: inline-block; }
    .dot.free { background: rgba(255,255,255,0.10); border: 1px solid var(--line-strong); }
    .dot.taken { background: var(--gold); }

    .bus-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
      max-width: 320px;
    }
    .seat {
      aspect-ratio: 1;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
      color: var(--cream-dim);
    }
    .seat.taken {
      background: var(--gold);
      color: #1a0a10;
      border-color: var(--gold);
    }

    /* === LIST === */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .filters input, .filters select {
      height: 38px;
      background: rgba(0,0,0,0.22);
      border: 1px solid var(--line-strong);
      border-radius: 9px;
      color: var(--cream);
      padding: 0 12px;
      font-size: 13px;
      font-family: var(--geo);
      outline: none;
    }
    .filters input { flex: 1; min-width: 140px; }
    .filters input:focus, .filters select:focus { border-color: var(--gold); }

    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 560px; }
    th {
      text-align: left;
      padding: 9px 10px;
      color: var(--cream-dim);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--line-strong);
      white-space: nowrap;
    }
    td {
      padding: 10px;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: 0; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }
    .pill.bus { background: rgba(109,184,222,0.16); color: var(--bus); }
    .pill.car { background: rgba(201,138,216,0.16); color: var(--car); }
    .pill.in { background: rgba(109,222,160,0.16); color: var(--ok); }
    .pill.wait { background: rgba(232,168,104,0.14); color: var(--pending); }
    .nm { font-weight: 700; color: var(--cream); }
    .sub { font-size: 11px; color: var(--cream-dim); }

    .empty { text-align: center; color: var(--cream-dim); padding: 30px 0; font-size: 13px; }
    .loading { text-align: center; color: var(--cream-dim); padding: 40px 0; }
    .spin {
      width: 26px; height: 26px;
      border: 3px solid var(--line-strong);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: rot 0.8s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes rot { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">

    <!-- LOGIN -->
    <div class="login" id="login">
      <h1>🔐 ადმინ-დაშბორდი</h1>
      <p>შეიყვანე PIN (Config-ის checkin_pin)</p>
      <input id="pinInput" inputmode="numeric" type="password" placeholder="••••" maxlength="10" autocomplete="off">
      <button id="loginBtn">შესვლა</button>
      <div class="err" id="loginErr"></div>
    </div>

    <!-- APP -->
    <div class="app" id="app">
      <header>
        <div class="title">
          <h1>FARMASI ივენთები</h1>
          <p>ადმინ-დაშბორდი · ცოცხალი მონაცემები</p>
        </div>
        <div class="header-actions">
          <span class="updated" id="updated"></span>
          <button class="btn-ghost" id="refreshBtn">🔄 განახლება</button>
          <button class="btn-ghost" id="archiveBtn" style="border-color:rgba(229,180,90,.5);">📦 ახალი ივენთის დაწყება</button>
        </div>
      </header>

      <div class="stats" id="statCards"></div>

      <div class="grid-2">
        <div class="card">
          <h2>📋 მონაწილეთა სია <span class="count" id="listCount"></span></h2>
          <div class="filters">
            <input id="search" placeholder="🔍 ძებნა — სახელი, ბილეთი, ქალაქი...">
            <select id="filterTransport">
              <option value="">ყველა ტრანსპორტი</option>
              <option value="bus">🚌 ავტობუსი</option>
              <option value="car">🚗 მანქანა</option>
            </select>
            <select id="filterCheckin">
              <option value="">ყველა სტატუსი</option>
              <option value="in">✓ შემოსული</option>
              <option value="wait">დარჩენილი</option>
            </select>
          </div>
          <div class="table-scroll">
            <table>
              <thead>
                <tr>
                  <th>მონაწილე</th>
                  <th>ბილეთი</th>
                  <th>ტრანსპორტი</th>
                  <th>სტატუსი</th>
                </tr>
              </thead>
              <tbody id="listBody"></tbody>
            </table>
          </div>
          <div class="empty" id="listEmpty" style="display:none;">ჩანაწერი ვერ მოიძებნა</div>
        </div>

        <div class="card">
          <h2>🚌 ავტობუსის ადგილები <span class="count" id="seatCount"></span></h2>
          <div class="bus-legend">
            <span><i class="dot taken"></i> დაკავებული</span>
            <span><i class="dot free"></i> თავისუფალი</span>
          </div>
          <div class="bus-grid" id="busGrid"></div>
        </div>
      </div>
    </div>

    <div class="loading" id="loading" style="display:none;">
      <div class="spin"></div>
      <div>იტვირთება...</div>
    </div>

  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxD5ArKdm0sg3pVzx5hjiRND-eRsvGwZ5eZwSZRI639NYhtzv1Qgj-dr8tcJqSkrOX4eA/exec";
    const TOTAL_SEATS = 54;

    let adminPin = "";
    let allTickets = [];

    const el = id => document.getElementById(id);

    function api(params) {
      return new Promise((resolve, reject) => {
        const cb = "__admCb_" + Date.now() + "_" + Math.random().toString(36).slice(2);
        const script = document.createElement("script");
        const q = new URLSearchParams();
        Object.keys(params || {}).forEach(k => {
          if (params[k] !== undefined && params[k] !== null) q.append(k, params[k]);
        });
        q.append("callback", cb);
        const cleanup = () => { delete window[cb]; if (script.parentNode) script.remove(); };
        const timer = setTimeout(() => { cleanup(); reject(new Error("timeout")); }, 18000);
        window[cb] = data => { clearTimeout(timer); cleanup(); resolve(data); };
        script.onerror = () => { clearTimeout(timer); cleanup(); reject(new Error("failed")); };
        script.src = API_URL + "?" + q.toString();
        document.head.appendChild(script);
      });
    }

    // ── LOGIN ──
    async function doLogin() {
      const pin = el("pinInput").value.trim();
      el("loginErr").textContent = "";
      el("loginBtn").disabled = true;
      el("loginBtn").textContent = "მოწმდება...";

      try {
        const data = await api({ action: "get_checkins", pin: pin });
        if (data && data.ok) {
          adminPin = pin;
          el("login").classList.add("hide");
          el("app").classList.add("show");
          ingest(data);
          loadStatus();
        } else {
          el("loginErr").textContent = data && data.error === "Invalid PIN"
            ? "PIN არასწორია"
            : (data && data.error) || "შესვლა ვერ მოხერხდა";
        }
      } catch (e) {
        el("loginErr").textContent = "კავშირი ვერ მოხერხდა — სცადე ხელახლა";
      } finally {
        el("loginBtn").disabled = false;
        el("loginBtn").textContent = "შესვლა";
      }
    }

    // ── DATA ──
    async function loadStatus() {
      try {
        const s = await api({ action: "status" });
        if (s && s.ok) {
          window.__busCount = Number(s.busCount || 1) || 1;
          renderStats(s);
          renderBusMap();
        }
      } catch (e) {}
    }

    async function refresh() {
      el("refreshBtn").disabled = true;
      try {
        const data = await api({ action: "get_checkins", pin: adminPin });
        if (data && data.ok) ingest(data);
        await loadStatus();
      } catch (e) {}
      el("refreshBtn").disabled = false;
    }

    function ingest(data) {
      allTickets = (data.tickets || []).filter(t => t.ticket_id);
      renderList();
      renderBusMap();
      stamp();
    }

    function stamp() {
      const now = new Date();
      el("updated").textContent = "განახლდა " + now.toLocaleTimeString("ka-GE", { hour: "2-digit", minute: "2-digit" });
    }

    // ── STATS ──
    function renderStats(s) {
      const busCount = allTickets.filter(t => (t.transport_mode || "bus") === "bus").length;
      const carCount = allTickets.filter(t => t.transport_mode === "car").length;
      const cards = [
        { num: s.totalRegistrations != null ? s.totalRegistrations : allTickets.length, lbl: "სულ რეგისტრაცია", cls: "accent" },
        { num: s.checkedInCount != null ? s.checkedInCount : 0, lbl: "შემოსული", cls: "ok" },
        { num: s.spotsLeft != null ? s.spotsLeft : "—", lbl: "თავისუფალი ადგილი", cls: "" },
        { num: busCount, lbl: "🚌 ავტობუსით", cls: "bus" },
        { num: carCount, lbl: "🚗 მანქანით", cls: "car" },
      ];
      el("statCards").innerHTML = cards.map(c =>
        '<div class="stat ' + c.cls + '"><div class="num">' + c.num + '</div><div class="lbl">' + c.lbl + '</div></div>'
      ).join("");
    }

    // ── LIST ──
    function renderList() {
      const term = el("search").value.trim().toLowerCase();
      const fT = el("filterTransport").value;
      const fC = el("filterCheckin").value;

      let rows = allTickets.slice();

      if (fT) rows = rows.filter(t => (t.transport_mode || "bus") === fT);
      if (fC === "in") rows = rows.filter(t => t.checked_in);
      if (fC === "wait") rows = rows.filter(t => !t.checked_in);
      if (term) {
        rows = rows.filter(t => {
          const hay = [t.first_name, t.last_name, t.ticket_id, t.city, t.position].join(" ").toLowerCase();
          return hay.includes(term);
        });
      }

      el("listCount").textContent = rows.length + " / " + allTickets.length;
      el("listEmpty").style.display = rows.length ? "none" : "block";

      el("listBody").innerHTML = rows.map(t => {
        const name = [t.first_name, t.last_name].filter(Boolean).join(" ") || "—";
        const mode = (t.transport_mode || "bus");
        const seat = mode === "bus" ? (t.bus_seat_number || t.seat_number || "") : "";
        const busNo = Number(t.bus_number || 1) || 1;
        const multiBus = (window.__busCount || 1) > 1;
        const transportPill = mode === "bus"
          ? '<span class="pill bus">🚌 ' + (seat ? (multiBus ? busNo + " · " : "") + "#" + seat : "ავტობუსი") + '</span>'
          : '<span class="pill car">🚗 მანქანა</span>';
        const statusPill = t.checked_in
          ? '<span class="pill in">✓ შემოსული</span>'
          : '<span class="pill wait">ელოდება</span>';
        return '<tr>' +
          '<td><div class="nm">' + esc(name) + '</div><div class="sub">' + esc(t.position || t.city || "") + '</div></td>' +
          '<td>' + esc(t.ticket_id || "") + '</td>' +
          '<td>' + transportPill + '</td>' +
          '<td>' + statusPill + '</td>' +
          '</tr>';
      }).join("");
    }

    // ── BUS MAP ──
    function renderBusMap() {
      const takenByBus = {};
      let maxBus = 1;
      allTickets.forEach(t => {
        if ((t.transport_mode || "bus") === "bus") {
          const s = Number(t.bus_seat_number || t.seat_number);
          const b = Number(t.bus_number || 1) || 1;
          if (b > maxBus) maxBus = b;
          if (s > 0) {
            if (!takenByBus[b]) takenByBus[b] = {};
            takenByBus[b][s] = [t.first_name, t.last_name].filter(Boolean).join(" ");
          }
        }
      });

      const busCount = Math.max(maxBus, Number(window.__busCount || 1) || 1);
      let totalTaken = 0;
      let html = "";

      for (let b = 1; b <= busCount; b++) {
        const taken = takenByBus[b] || {};
        const takenCount = Object.keys(taken).length;
        totalTaken += takenCount;

        if (busCount > 1) {
          html += '<div style="grid-column:1/-1;margin:' + (b > 1 ? '16px' : '0') + ' 0 6px;font-weight:800;color:var(--bus);">🚌 ავტობუსი ' + b + ' — ' + takenCount + ' / ' + TOTAL_SEATS + '</div>';
        }
        for (let i = 1; i <= TOTAL_SEATS; i++) {
          const isTaken = taken[i] !== undefined;
          html += '<div class="seat' + (isTaken ? ' taken' : '') + '"' +
            (isTaken ? ' title="' + esc(taken[i]) + '"' : '') + '>' + i + '</div>';
        }
      }

      el("seatCount").textContent = totalTaken + " / " + (TOTAL_SEATS * busCount);
      el("busGrid").innerHTML = html;
    }

    function esc(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    // ── EVENTS ──
    el("loginBtn").addEventListener("click", doLogin);
    el("pinInput").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
    el("refreshBtn").addEventListener("click", refresh);

    // ── 📦 ახალი ივენთის დაწყება — არქივი + გასუფთავება ──
    async function archiveCurrentEvent() {
      const sure = confirm(
        "ნამდვილად გინდა ახალი ივენთის დაწყება?\n\n" +
        "მიმდინარე რეგისტრაციები, გაუქმებები და გათამაშების შედეგები " +
        "გადავა საარქივო ტაბებში და ცხრილები გასუფთავდება.\n\n" +
        "მონაცემები არ იკარგება — Google Sheet-ში დარჩება Archive ტაბებად."
      );
      if (!sure) return;

      const name = prompt("არქივის სახელი (მაგ: იუბილე-2026):",
        new Date().toISOString().slice(0, 10));
      if (name === null) return;

      const btn = el("archiveBtn");
      btn.disabled = true;
      btn.textContent = "📦 ინახება...";
      try {
        const res = await api({ action: "archive_event", pin: adminPin, archive_name: name.trim() });
        if (res && res.ok) {
          alert("✓ " + (res.msg || "ივენთი დაარქივდა"));
          await refresh();
        } else {
          alert("შეცდომა: " + ((res && res.error) || "ვერ შესრულდა"));
        }
      } catch (e) {
        alert("კავშირი ვერ მოხერხდა — სცადე ხელახლა");
      } finally {
        btn.disabled = false;
        btn.textContent = "📦 ახალი ივენთის დაწყება";
      }
    }
    el("archiveBtn").addEventListener("click", archiveCurrentEvent);
    el("search").addEventListener("input", renderList);
    el("filterTransport").addEventListener("change", renderList);
    el("filterCheckin").addEventListener("change", renderList);

    el("pinInput").focus();
  </script>
</body>
